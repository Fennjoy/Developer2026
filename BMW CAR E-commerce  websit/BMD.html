<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car E-Commerce</title>
    <link rel="stylesheet" href="style.css"
    <link rel=""
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <h1>Car E-Commerce</h1>
        </div>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#cars">Cars</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
        <div class="cart">
            <span id="cart-count">0</span>
            <img src="cart-icon.png" alt="Cart">
        </div>
    </header>

    <section id="home" class="hero">
        <h2>Welcome to Car E-Commerce</h2>
        <p>Find your dream car today!</p>
        <a href="#cars" class="btn">Explore Cars</a>
    </section>

    <section id="cars" class="cars">
        <h2>Our Collection</h2>
        
        <div class="car-list">
            <div class="car-item">
                <img src="a.jfif" alt="Car 1">
                <h3>Car Model 1</h3>
                <p>$50,000</p>
               
                <button onclick="addToCart('Car Model 1', 50000)">Add to Cart</button>
            </div>
            <div class="car-item">
                <img src="f.jfif" alt="Car 2">
                <h3>Car Model 2</h3>
                <p>$60,000</p>
                <button onclick="addToCart('Car Model 2', 60000)">Add to Cart</button>
            </div>
            <div class="car-item">
                <img src="g.jfif" alt="Car 3">
                <h3>Car Model 3</h3>
                <p>$70,000</p>
                <button onclick="addToCart('Car Model 3', 70000)">Add to Cart</button>
            </div>
        </div>
    </section>

    <footer id="contact">
        <p>&copy; 2023 Car E-Commerce. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script scr="script.js"></script>
</body>
</html>
